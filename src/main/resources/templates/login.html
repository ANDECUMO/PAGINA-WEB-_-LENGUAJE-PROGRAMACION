<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Portal de Acceso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1d4ed8 55%, #22d3ee);
        }

        .glass-card {
            backdrop-filter: blur(6px);
            background-color: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 1rem;
        }
    </style>
</head>
<body>
<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow-lg glass-card" style="max-width: 460px; width: 100%;">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <h3 class="fw-bold mb-1">Bienvenido</h3>
                <p class="text-muted mb-0">Accede con tu rol para entrar a tu panel.</p>
            </div>

            <div class="alert alert-danger" th:if="${param.error}">
                Usuario o contraseña incorrectos.
            </div>
            <div class="alert alert-success" th:if="${param.logout}">
                Sesión cerrada correctamente.
            </div>

            <form th:action="@{/login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="mb-3">
                    <label for="username" class="form-label">Usuario</label>
                    <input id="username" name="username" type="text" class="form-control form-control-lg" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña</label>
                    <input id="password" name="password" type="password" class="form-control form-control-lg" required>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100">Entrar al sistema</button>
            </form>

            <hr>
            <p class="small text-muted mb-1">Credenciales de prueba:</p>
            <ul class="small text-muted mb-0">
                <li>admin / admin123 (ADMIN)</li>
                <li>user / user123 (USER)</li>
            </ul>
        </div>
    </div>
</div>
</body>
</html>
