<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mis Pedidos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .order-card { transition: transform 0.2s; }
        .order-card:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.12); }
        .language-buttons { display: flex; gap: 8px; }
        .language-btn {
            padding: 4px 10px; border-radius: 0.25rem; border: 1px solid rgba(255,255,255,0.5);
            background-color: transparent; color: white; cursor: pointer; font-weight: 500;
            font-size: 11px; transition: all 0.3s ease; text-decoration: none; display: inline-block;
        }
        .language-btn:hover { background-color: rgba(255,255,255,0.2); color: white; }
        .language-btn.active { background-color: rgba(255,255,255,0.3); color: white; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg bg-primary navbar-dark shadow-sm">
    <div class="container">
        <span class="navbar-brand fw-semibold">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-bag-check me-2" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M10.854 8.146a.5.5 0 0 1 0 .708l-3 3a.5.5 0 0 1-.708 0l-1.5-1.5a.5.5 0 0 1 .708-.708L7.5 10.793l2.646-2.647a.5.5 0 0 1 .708 0"/>
                <path d="M8 1a2.5 2.5 0 0 1 2.5 2.5V4h-5v-.5A2.5 2.5 0 0 1 8 1m3.5 3v-.5a3.5 3.5 0 1 0-7 0V4H1v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V4zM2 5h12v9a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1z"/>
            </svg>
            Mis Pedidos
        </span>
        <div class="d-flex gap-3 align-items-center">
            <div class="language-buttons">
                <a th:href="@{/orders(lang='es')}" class="language-btn" th:classappend="${#locale.language} == 'es' ? 'active' : ''">ES</a>
                <a th:href="@{/orders(lang='en')}" class="language-btn" th:classappend="${#locale.language} == 'en' ? 'active' : ''">EN</a>
                <a th:href="@{/orders(lang='pt')}" class="language-btn" th:classappend="${#locale.language} == 'pt' ? 'active' : ''">PT</a>
            </div>
            <span class="text-white">Hola, <span th:text="${username}">Usuario</span></span>
            <a th:href="@{/products}" class="btn btn-light btn-sm">Catálogo</a>
            <a th:href="@{/cart}" class="btn btn-outline-light btn-sm">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M0 1.5A.5.5 0 0 1 .5 1H2a.5.5 0 0 1 .485.379L2.89 3H14.5a.5.5 0 0 1 .49.598l-1 5a.5.5 0 0 1-.465.401l-9.397.472L4.415 11H13a.5.5 0 0 1 0 1H4a.5.5 0 0 1-.491-.408L2.01 3.607 1.61 2H.5a.5.5 0 0 1-.5-.5M3.102 4l.84 4.479 9.144-.459L13.89 4zM5 12a2 2 0 1 0 0 4 2 2 0 0 0 0-4m7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4m-7 1a1 1 0 1 1 0 2 1 1 0 0 1 0-2m7 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2"/>
                </svg>
                Carrito
            </a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-light btn-sm">Cerrar sesión</button>
            </form>
        </div>
    </div>
</nav>

<div class="container py-4">

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${orders == null or orders.isEmpty()}">
        <div class="text-center py-5">
            <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" fill="#dee2e6" viewBox="0 0 16 16">
                <path d="M8 1a2.5 2.5 0 0 1 2.5 2.5V4h-5v-.5A2.5 2.5 0 0 1 8 1m3.5 3v-.5a3.5 3.5 0 1 0-7 0V4H1v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V4zM2 5h12v9a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1z"/>
            </svg>
            <h3 class="text-muted mt-3">No tienes pedidos aún</h3>
            <p class="text-muted">¡Explora nuestro catálogo y realiza tu primer pedido!</p>
            <a th:href="@{/products}" class="btn btn-primary btn-lg mt-2">Ir al Catálogo</a>
        </div>
    </div>

    <div th:unless="${orders == null or orders.isEmpty()}">
        <h4 class="mb-4">
            <span th:text="${orders.size()}">0</span> pedido(s)
        </h4>

        <div class="row g-4">
            <div class="col-12" th:each="order : ${orders}">
                <div class="card order-card border-0 shadow-sm">
                    <div class="card-body">
                        <div class="row align-items-center">
                            <div class="col-md-2">
                                <h5 class="mb-0 text-primary">Pedido #<span th:text="${order.id}">1</span></h5>
                                <small class="text-muted" th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}">01/01/2026</small>
                            </div>
                            <div class="col-md-3">
                                <small class="text-muted">Productos</small>
                                <p class="mb-0"><span th:text="${order.items.size()}">0</span> item(s)</p>
                            </div>
                            <div class="col-md-2">
                                <small class="text-muted">Total</small>
                                <p class="mb-0 fw-bold">$<span th:text="${#numbers.formatDecimal(order.totalAmount, 1, 2)}">0.00</span></p>
                            </div>
                            <div class="col-md-3">
                                <small class="text-muted">Estado</small>
                                <div>
                                    <span class="badge" th:classappend="${order.statusBadgeClass}"
                                          th:text="${order.statusLabel}">Estado</span>
                                </div>
                                <div class="progress mt-1" style="height: 5px;">
                                    <div class="progress-bar" role="progressbar"
                                         th:style="'width: ' + ${order.statusProgress} + '%'"
                                         th:classappend="${order.status.name() == 'CANCELADO'} ? 'bg-danger' : 'bg-success'">
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-2 text-end">
                                <a th:href="@{'/orders/' + ${order.id}}" class="btn btn-outline-primary btn-sm">
                                    Ver Detalle
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-4">
        <a th:href="@{/user}" class="btn btn-secondary">Volver al Panel</a>
        <a th:href="@{/products}" class="btn btn-outline-primary">Ir al Catálogo</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
