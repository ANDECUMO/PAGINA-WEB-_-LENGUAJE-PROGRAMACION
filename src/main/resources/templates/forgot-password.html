<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Recuperar Contraseña</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1d4ed8 55%, #22d3ee);
            min-height: 100vh;
        }
        .glass-card {
            backdrop-filter: blur(6px);
            background-color: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 1rem;
        }
    </style>
</head>
<body>
<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow-lg glass-card" style="max-width: 460px; width: 100%;">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <h3 class="fw-bold mb-1">Recuperar Contraseña</h3>
                <p class="text-muted mb-0">Ingresa tu correo y te enviaremos un enlace para restablecer tu contraseña.</p>
            </div>

            <div class="alert alert-success" th:if="${param.sent}">
                Si el correo existe en nuestro sistema, recibirás un enlace en tu bandeja de entrada.
            </div>

            <div class="alert alert-danger" th:if="${param.error}">
                No encontramos una cuenta con ese correo electrónico.
            </div>

            <form th:action="@{/forgot-password}" method="post" th:if="${param.sent == null}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="mb-3">
                    <label for="email" class="form-label">Correo Electrónico</label>
                    <input id="email" name="email" type="email"
                           class="form-control form-control-lg"
                           required
                           placeholder="correo@ejemplo.com">
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100">
                    Enviar Enlace de Recuperación
                </button>
            </form>

            <div class="text-center mt-3">
                <a th:href="@{/login}" class="text-decoration-none small text-muted">
                    Volver al inicio de sesión
                </a>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
