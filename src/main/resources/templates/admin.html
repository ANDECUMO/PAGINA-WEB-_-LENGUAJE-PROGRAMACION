<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Panel ADMIN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background: linear-gradient(120deg, #111827, #1f2937); min-height: 100vh;">
<nav class="navbar navbar-expand-lg bg-black navbar-dark border-bottom border-secondary-subtle">
    <div class="container">
        <span class="navbar-brand fw-semibold">Panel ADMIN</span>
        <form th:action="@{/logout}" method="post" class="d-flex">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn btn-outline-light btn-sm">Cerrar sesión</button>
        </form>
    </div>
</nav>

<div class="container py-5">
    <div class="card border-0 shadow-lg rounded-4 bg-light">
        <div class="card-body p-5">
            <h2 class="fw-bold mb-2">Bienvenido al panel ADMIN</h2>
            <p class="text-muted mb-4">Ingresaste con el usuario: <strong th:text="${username}"></strong></p>
            <div class="alert alert-warning border-0">
                Esta zona es exclusiva para el rol ADMIN.
            </div>
            <a href="/public" class="btn btn-dark">Volver a página pública</a>
        </div>
    </div>
</div>
</body>
</html>
