<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${product.getLocalizedName(currentLocale)}">Detalle del Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .product-image {
            max-height: 500px;
            object-fit: contain;
            border-radius: 15px;
        }
        .detail-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
        }
        .language-buttons {
            display: flex;
            gap: 8px;
        }
        .language-btn {
            padding: 4px 10px;
            border-radius: 0.25rem;
            border: 1px solid rgba(255, 255, 255, 0.5);
            background-color: transparent;
            color: white;
            cursor: pointer;
            font-weight: 500;
            font-size: 11px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        .language-btn:hover {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
        }
        .language-btn.active {
            background-color: rgba(255, 255, 255, 0.3);
            color: white;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg bg-primary navbar-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-semibold" th:href="@{/products}" th:text="#{app.products.backToCatalog}">Volver al Catálogo</a>
        <div class="d-flex gap-3 align-items-center">
            <div class="language-buttons">
                <a th:href="@{'/products/' + ${product.id} + '?lang=es'}" class="language-btn" th:classappend="${#locale.language} == 'es' ? 'active' : ''" th:text="#{app.menu.Spanish}">ES</a>
                <a th:href="@{'/products/' + ${product.id} + '?lang=en'}" class="language-btn" th:classappend="${#locale.language} == 'en' ? 'active' : ''" th:text="#{app.menu.English}">EN</a>
                <a th:href="@{'/products/' + ${product.id} + '?lang=pt'}" class="language-btn" th:classappend="${#locale.language} == 'pt' ? 'active' : ''" th:text="#{app.menu.Portuguese}">PT</a>
            </div>
            <span class="text-white"><span th:text="#{app.products.hello}">Hola</span>, <span th:text="${username}">Usuario</span></span>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-light btn-sm" th:text="#{app.menu.logout}">Cerrar sesión</button>
            </form>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="row g-4">
        <!-- Imagen del producto -->
        <div class="col-lg-6">
            <img th:src="${product.imageUrl}"
                 th:alt="${product.getLocalizedName(currentLocale)}"
                 class="img-fluid product-image w-100 shadow-lg" />
        </div>

        <!-- Información del producto -->
        <div class="col-lg-6">
            <div class="detail-section">
                <div class="mb-3">
                    <span class="badge bg-primary fs-6"
                          th:if="${product.category != null}"
                          th:text="${product.category.getLocalizedName(currentLocale)}">
                        Categoría
                    </span>
                </div>

                <h1 class="display-5 fw-bold mb-3" th:text="${product.getLocalizedName(currentLocale)}">
                    Nombre del Producto
                </h1>

                <div class="mb-4">
                    <h2 class="text-primary">
                        $<span th:text="${#numbers.formatDecimal(product.price, 1, 2)}">0.00</span>
                    </h2>
                </div>

                <div class="mb-4">
                    <h5 class="mb-2" th:text="#{app.products.description}">Descripción:</h5>
                    <p class="lead" th:text="${product.getLocalizedDescription(currentLocale)}">
                        Descripción completa del producto...
                    </p>
                </div>

                <div class="mb-4">
                    <span class="badge"
                          th:classappend="${product.available} ? 'bg-success' : 'bg-danger'"
                          style="font-size: 1rem; padding: 10px 20px;">
                        <span th:if="${product.available}" th:text="'✓ ' + #{app.products.available}">✓ Disponible</span>
                        <span th:unless="${product.available}" th:text="'✗ ' + #{app.products.unavailable}">✗ No Disponible</span>
                    </span>
                </div>

                <div class="d-grid gap-2">
                    <button class="btn btn-primary btn-lg"
                            th:disabled="${!product.available}"
                            onclick="alert('Función de pedido en desarrollo')"
                            th:text="#{app.products.addToCart}">
                        Agregar al Carrito
                    </button>
                    <a th:href="@{/products}" class="btn btn-outline-secondary" th:text="#{app.products.backToCatalog}">
                        Volver al Catálogo
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Información adicional -->
    <div class="row mt-5">
        <div class="col-12">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title" th:text="#{app.products.additionalInfo}">Información Adicional</h5>
                    <ul class="list-unstyled">
                        <li><strong th:text="#{app.products.productId}">ID del Producto:</strong> <span th:text="${product.id}">1</span></li>
                        <li><strong th:text="#{app.products.category}">Categoría:</strong>
                            <span th:if="${product.category != null}" th:text="${product.category.getLocalizedName(currentLocale)}">N/A</span>
                            <span th:unless="${product.category != null}" th:text="#{app.products.noCategory}">Sin categoría</span>
                        </li>
                        <li><strong th:text="#{app.products.status}">Estado:</strong>
                            <span th:if="${product.available}" th:text="#{app.products.available}">Disponible</span>
                            <span th:unless="${product.available}" th:text="#{app.products.unavailable}">No disponible</span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
