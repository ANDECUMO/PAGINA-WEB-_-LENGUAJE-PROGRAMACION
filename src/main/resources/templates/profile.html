<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mi Perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg bg-primary navbar-dark shadow-sm">
    <div class="container">
        <span class="navbar-brand fw-semibold">👤 Mi Perfil</span>
        <div class="d-flex gap-3 align-items-center">
            <a th:href="@{/user}" class="btn btn-light btn-sm">Panel Principal</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-light btn-sm">Cerrar sesión</button>
            </form>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="alert alert-success" th:if="${param.success}">
                ✓ Perfil actualizado correctamente
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <h3 class="card-title mb-4">Información Personal</h3>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nombre de Usuario:</label>
                        <p class="form-control-plaintext" th:text="${user.username}">username</p>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Nombre Completo:</label>
                        <p class="form-control-plaintext" th:text="${user.name}">Nombre</p>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Correo Electrónico:</label>
                        <p class="form-control-plaintext" th:text="${user.email}">email@example.com</p>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Rol:</label>
                        <span class="badge bg-primary" th:text="${user.role}">USER</span>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Fecha de Registro:</label>
                        <p class="form-control-plaintext" th:text="${#temporals.format(user.createdAt, 'dd/MM/yyyy HH:mm')}">01/01/2024</p>
                    </div>

                    <div class="d-flex gap-2 mt-4">
                        <a th:href="@{/profile/edit}" class="btn btn-primary">
                            ✏️ Editar Perfil
                        </a>
                        <a th:href="@{/user}" class="btn btn-secondary">
                            ← Volver
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
