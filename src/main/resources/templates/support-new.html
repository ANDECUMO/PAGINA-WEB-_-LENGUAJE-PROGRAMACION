<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nuevo Ticket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg bg-primary navbar-dark shadow-sm">
    <div class="container">
        <span class="navbar-brand fw-semibold">📝 Crear Ticket de Soporte</span>
        <div class="d-flex gap-3 align-items-center">
            <a th:href="@{/support}" class="btn btn-light btn-sm">Ver Tickets</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-light btn-sm">Cerrar sesión</button>
            </form>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <h3 class="card-title mb-4">Nuevo Ticket de Soporte</h3>
                    
                    <div class="alert alert-info">
                        <strong>ℹ️ Sistema en Desarrollo</strong><br>
                        El sistema de tickets está en fase de implementación. 
                        Puedes completar el formulario, pero aún no se guardará en la base de datos.
                    </div>

                    <form>
                        <div class="mb-3">
                            <label for="category" class="form-label">Categoría *</label>
                            <select class="form-select" id="category" required>
                                <option value="">Selecciona una categoría...</option>
                                <option value="pedido">Problema con Pedido</option>
                                <option value="producto">Consulta sobre Producto</option>
                                <option value="pago">Problema de Pago</option>
                                <option value="cuenta">Problema con mi Cuenta</option>
                                <option value="otro">Otro</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="subject" class="form-label">Asunto *</label>
                            <input type="text" class="form-control" id="subject" 
                                   placeholder="Breve descripción del problema" required>
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label">Descripción Detallada *</label>
                            <textarea class="form-control" id="description" rows="6" 
                                      placeholder="Explica tu problema o consulta en detalle..." required></textarea>
                        </div>

                        <div class="mb-3">
                            <label for="priority" class="form-label">Prioridad</label>
                            <select class="form-select" id="priority">
                                <option value="baja">Baja</option>
                                <option value="media" selected>Media</option>
                                <option value="alta">Alta</option>
                            </select>
                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <button type="button" class="btn btn-primary" 
                                    onclick="alert('Funcionalidad en desarrollo. El ticket no se guardará aún.')">
                                📤 Crear Ticket
                            </button>
                            <a th:href="@{/support}" class="btn btn-secondary">
                                Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
