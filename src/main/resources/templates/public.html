<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="#{app.public.title}">Zona Pública</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .language-buttons {
            display: flex;
            gap: 8px;
        }

        .language-btn {
            padding: 6px 12px;
            border-radius: 0.25rem;
            border: 1px solid #fff;
            background-color: transparent;
            color: white;
            cursor: pointer;
            font-weight: 500;
            font-size: 12px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .language-btn:hover {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .language-btn.active {
            background-color: rgba(255, 255, 255, 0.3);
            color: white;
        }
    </style>
</head>
<body class="bg-body-tertiary">
<nav class="navbar navbar-expand-lg bg-dark navbar-dark">
    <div class="container">
        <span class="navbar-brand fw-semibold" th:text="#{app.title}">Spring Security Demo</span>
        <div class="language-buttons">
            <a th:href="@{/public?lang=es}" class="language-btn" th:classappend="${#locale.language} == 'es' ? 'active' : ''" th:text="#{app.menu.Spanish}">Español</a>
            <a th:href="@{/public?lang=en}" class="language-btn" th:classappend="${#locale.language} == 'en' ? 'active' : ''" th:text="#{app.menu.English}">English</a>
            <a th:href="@{/public?lang=pt}" class="language-btn" th:classappend="${#locale.language} == 'pt' ? 'active' : ''" th:text="#{app.menu.Portuguese}">Português</a>
        </div>
        <a class="btn btn-outline-light btn-sm" th:href="@{/login}" th:text="#{app.login.title}">Iniciar sesión</a>
    </div>
</nav>

<div class="container py-5">
    <div class="p-5 bg-white rounded-4 shadow-sm border">
        <h1 class="display-6 fw-bold" th:text="#{app.public.title}">Ruta Pública</h1>
        <p class="lead text-muted" th:text="#{app.public.description}">Esta página es visible para cualquier visitante sin autenticación.</p>
        <div class="d-flex gap-2 flex-wrap">
            <a th:href="@{/user}" class="btn btn-primary" th:text="#{app.user.title}">Ir a zona USER</a>
            <a th:href="@{/admin}" class="btn btn-dark" th:text="#{app.admin.title}">Ir a zona ADMIN</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
