<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nueva Contraseña</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1d4ed8 55%, #22d3ee);
            min-height: 100vh;
        }
        .glass-card {
            backdrop-filter: blur(6px);
            background-color: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 1rem;
        }
    </style>
</head>
<body>
<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow-lg glass-card" style="max-width: 460px; width: 100%;">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <h3 class="fw-bold mb-1">Nueva Contraseña</h3>
                <p class="text-muted mb-0">Escribe tu nueva contraseña.</p>
            </div>

            <div class="alert alert-danger" th:if="${param.error != null and param.error == 'mismatch'}">
                Las contraseñas no coinciden. Intenta de nuevo.
            </div>
            <div class="alert alert-danger" th:if="${param.error != null and param.error != 'mismatch'}">
                El enlace es inválido o ha expirado. Solicita uno nuevo.
            </div>

            <form th:action="@{/reset-password}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="token" th:value="${token}">

                <div class="mb-3">
                    <label for="password" class="form-label">Nueva Contraseña</label>
                    <input id="password" name="password" type="password"
                           class="form-control form-control-lg"
                           required minlength="6"
                           placeholder="Mínimo 6 caracteres">
                    <small class="text-muted">Mínimo 6 caracteres</small>
                </div>

                <div class="mb-3">
                    <label for="confirmPassword" class="form-label">Confirmar Contraseña</label>
                    <input id="confirmPassword" name="confirmPassword" type="password"
                           class="form-control form-control-lg"
                           required minlength="6"
                           placeholder="Repite la contraseña">
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100">
                    Cambiar Contraseña
                </button>
            </form>

            <div class="text-center mt-3">
                <a th:href="@{/forgot-password}" class="text-decoration-none small text-muted">
                    Solicitar nuevo enlace
                </a>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
