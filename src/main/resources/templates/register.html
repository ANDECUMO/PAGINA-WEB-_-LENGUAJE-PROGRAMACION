<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro de Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .register-card {
            backdrop-filter: blur(6px);
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 1rem;
        }
    </style>
</head>
<body>
<div class="container d-flex justify-content-center align-items-center min-vh-100 py-5">
    <div class="card shadow-lg register-card" style="max-width: 500px; width: 100%;">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <h3 class="fw-bold mb-1">Crear Cuenta Nueva</h3>
                <p class="text-muted mb-0">Completa el formulario para registrarte</p>
            </div>

            <div class="alert alert-danger" th:if="${param.error}">
                <span>Error al crear la cuenta. El usuario o email ya existe.</span>
            </div>

            <form th:action="@{/register}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="mb-3">
                    <label for="username" class="form-label">Nombre de Usuario</label>
                    <input id="username" name="username" type="text" 
                           class="form-control form-control-lg" 
                           required minlength="3" maxlength="50"
                           placeholder="usuario123">
                    <small class="text-muted">Mínimo 3 caracteres</small>
                </div>

                <div class="mb-3">
                    <label for="name" class="form-label">Nombre Completo</label>
                    <input id="name" name="name" type="text" 
                           class="form-control form-control-lg" 
                           required minlength="2" maxlength="100"
                           placeholder="Juan Pérez">
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Correo Electrónico</label>
                    <input id="email" name="email" type="email" 
                           class="form-control form-control-lg" 
                           required
                           placeholder="correo@ejemplo.com">
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña</label>
                    <input id="password" name="password" type="password" 
                           class="form-control form-control-lg" 
                           required minlength="6"
                           placeholder="Mínimo 6 caracteres">
                    <small class="text-muted">Mínimo 6 caracteres</small>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100 mt-3">
                    Registrarse
                </button>
            </form>

            <div class="text-center mt-3">
                <p class="mb-0">
                    ¿Ya tienes cuenta? 
                    <a th:href="@{/login}" class="fw-bold text-decoration-none">
                        Inicia sesión aquí
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
