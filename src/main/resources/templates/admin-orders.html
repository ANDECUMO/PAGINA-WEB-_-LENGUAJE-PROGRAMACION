<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestión de Pedidos - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .language-buttons { display: flex; gap: 8px; }
        .language-btn {
            padding: 6px 12px; border-radius: 0.25rem; border: 1px solid rgba(255,255,255,0.5);
            background-color: transparent; color: white; cursor: pointer; font-weight: 500;
            font-size: 12px; transition: all 0.3s ease; text-decoration: none; display: inline-block;
        }
        .language-btn:hover { background-color: rgba(255,255,255,0.2); color: white; }
        .language-btn.active { background-color: rgba(255,255,255,0.3); color: white; }
        .order-row { transition: background 0.2s; }
        .order-row:hover { background: rgba(13,110,253,0.05); }
    </style>
</head>
<body style="background: linear-gradient(120deg, #111827, #1f2937); min-height: 100vh;">
<nav class="navbar navbar-expand-lg bg-black navbar-dark border-bottom border-secondary-subtle">
    <div class="container d-flex justify-content-between align-items-center">
        <span class="navbar-brand fw-semibold">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-clipboard-check me-2" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M10.854 7.146a.5.5 0 0 1 0 .708l-3 3a.5.5 0 0 1-.708 0l-1.5-1.5a.5.5 0 1 1 .708-.708L7.5 9.793l2.646-2.647a.5.5 0 0 1 .708 0"/>
                <path d="M4 1.5H3a2 2 0 0 0-2 2V14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3.5a2 2 0 0 0-2-2h-1v1h1a1 1 0 0 1 1 1V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1h1z"/>
                <path d="M9.5 1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5zm-3-1A1.5 1.5 0 0 0 5 1.5v1A1.5 1.5 0 0 0 6.5 4h3A1.5 1.5 0 0 0 11 2.5v-1A1.5 1.5 0 0 0 9.5 0z"/>
            </svg>
            Gestión de Pedidos
        </span>
        <div class="d-flex gap-3 align-items-center">
            <div class="language-buttons">
                <a th:href="@{/admin/orders(lang='es')}" class="language-btn" th:classappend="${#locale.language} == 'es' ? 'active' : ''">ES</a>
                <a th:href="@{/admin/orders(lang='en')}" class="language-btn" th:classappend="${#locale.language} == 'en' ? 'active' : ''">EN</a>
                <a th:href="@{/admin/orders(lang='pt')}" class="language-btn" th:classappend="${#locale.language} == 'pt' ? 'active' : ''">PT</a>
            </div>
            <a href="/admin" class="btn btn-outline-light btn-sm">Panel Admin</a>
            <form th:action="@{/logout}" method="post" class="d-flex">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-light btn-sm">Cerrar sesión</button>
            </form>
        </div>
    </div>
</nav>

<div class="container py-4">
    <!-- Alerts -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Filters -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <h6 class="text-white-50 mb-3" style="color: #6b7280 !important;">Filtrar por Estado:</h6>
            <div class="d-flex flex-wrap gap-2">
                <a th:href="@{/admin/orders}"
                   th:classappend="${selectedStatus == null} ? 'btn-light' : 'btn-outline-light'"
                   class="btn btn-sm">Todos</a>
                <a th:each="s : ${statuses}"
                   th:href="@{/admin/orders(status=${s.name()})}"
                   th:classappend="${selectedStatus != null and selectedStatus == s.name()} ? 'btn-light' : 'btn-outline-light'"
                   class="btn btn-sm"
                   th:text="${s.name()}">Estado</a>
            </div>
        </div>
    </div>

    <!-- Orders Table -->
    <div class="card border-0 shadow-lg rounded-4">
        <div class="card-body p-0">
            <div th:if="${orders == null or orders.isEmpty()}" class="text-center py-5">
                <h5 class="text-muted">No hay pedidos</h5>
            </div>
            <div class="table-responsive" th:unless="${orders == null or orders.isEmpty()}">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th># Pedido</th>
                            <th>Cliente</th>
                            <th>Email</th>
                            <th>Productos</th>
                            <th>Total</th>
                            <th>Estado</th>
                            <th>Fecha</th>
                            <th>Cambiar Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="order-row" th:each="order : ${orders}">
                            <td class="fw-bold">#<span th:text="${order.id}">1</span></td>
                            <td th:text="${order.user.name}">Cliente</td>
                            <td><small th:text="${order.user.email}">email</small></td>
                            <td>
                                <span th:text="${order.items.size()}">0</span> item(s)
                            </td>
                            <td class="fw-bold">$<span th:text="${#numbers.formatDecimal(order.totalAmount, 1, 2)}">0.00</span></td>
                            <td>
                                <span class="badge" th:classappend="${order.statusBadgeClass}" th:text="${order.statusLabel}">Estado</span>
                            </td>
                            <td><small th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}">01/01/2026</small></td>
                            <td>
                                <form th:action="@{'/admin/orders/' + ${order.id} + '/status'}" method="post" class="d-flex gap-1">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <select class="form-select form-select-sm" name="status" style="min-width: 140px;">
                                        <option th:each="s : ${statuses}"
                                                th:value="${s.name()}"
                                                th:selected="${s == order.status}"
                                                th:text="${s.name()}">Estado</option>
                                    </select>
                                    <button type="submit" class="btn btn-warning btn-sm" title="Actualizar">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
                                            <path fill-rule="evenodd" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2z"/>
                                            <path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466"/>
                                        </svg>
                                    </button>
                                </form>
                            </td>
                            <td>
                                <a th:href="@{'/admin/orders/' + ${order.id}}" class="btn btn-outline-primary btn-sm">
                                    Ver
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="mt-4">
        <a href="/admin" class="btn btn-light">Volver al Panel Admin</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
