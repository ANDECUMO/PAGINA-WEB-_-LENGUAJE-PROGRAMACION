<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Finalizar Pedido</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .cart-item-img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg bg-primary navbar-dark shadow-sm">
    <div class="container">
        <span class="navbar-brand fw-semibold">Finalizar Pedido</span>
        <div class="d-flex gap-3 align-items-center">
            <span class="text-white">Hola, <span th:text="${username}">Usuario</span></span>
            <a th:href="@{/cart}" class="btn btn-light btn-sm">Volver al Carrito</a>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="row">
        <!-- Checkout Form -->
        <div class="col-lg-7">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white">
                    <h5 class="mb-0">Información de Envío</h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/orders/place}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="mb-3">
                            <label for="shippingAddress" class="form-label fw-bold">Dirección de Envío *</label>
                            <textarea class="form-control" id="shippingAddress" name="shippingAddress"
                                      rows="3" required placeholder="Ingresa tu dirección completa..."></textarea>
                        </div>

                        <div class="mb-3">
                            <label for="notes" class="form-label fw-bold">Notas adicionales (opcional)</label>
                            <textarea class="form-control" id="notes" name="notes"
                                      rows="2" placeholder="Instrucciones especiales, preferencias de entrega..."></textarea>
                        </div>

                        <div class="alert alert-info">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-info-circle me-1" viewBox="0 0 16 16">
                                <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16"/>
                                <path d="m8.93 6.588-2.29.287-.082.38.45.083c.294.07.352.176.288.469l-.738 3.468c-.194.897.105 1.319.808 1.319.545 0 1.178-.252 1.465-.598l.088-.416c-.2.176-.492.246-.686.246-.275 0-.375-.193-.304-.533zM9 4.5a1 1 0 1 1-2 0 1 1 0 0 1 2 0"/>
                            </svg>
                            Recibirás una confirmación por correo electrónico con los detalles de tu pedido.
                        </div>

                        <button type="submit" class="btn btn-success btn-lg w-100">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-check-circle me-2" viewBox="0 0 16 16">
                                <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16"/>
                                <path d="m10.97 4.97-.02.022-3.473 4.425-2.093-2.094a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-1.071-1.05"/>
                            </svg>
                            Confirmar Pedido
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Order Summary -->
        <div class="col-lg-5">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Resumen de Compra</h5>
                </div>
                <div class="card-body p-0">
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item" th:each="item : ${cart.items}">
                            <div class="d-flex align-items-center">
                                <img th:src="${item.product.imageUrl}" th:alt="${item.product.name}" class="cart-item-img me-3"/>
                                <div class="flex-grow-1">
                                    <h6 class="mb-0" th:text="${item.product.getLocalizedName(currentLocale)}">Producto</h6>
                                    <small class="text-muted">
                                        $<span th:text="${#numbers.formatDecimal(item.product.price, 1, 2)}">0.00</span>
                                        x <span th:text="${item.quantity}">1</span>
                                    </small>
                                </div>
                                <strong>$<span th:text="${#numbers.formatDecimal(item.subtotal, 1, 2)}">0.00</span></strong>
                            </div>
                        </li>
                    </ul>
                </div>
                <div class="card-footer bg-white">
                    <div class="d-flex justify-content-between">
                        <strong class="fs-5">Total</strong>
                        <strong class="fs-5 text-primary">$<span th:text="${#numbers.formatDecimal(cart.total, 1, 2)}">0.00</span></strong>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
