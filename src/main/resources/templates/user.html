<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Panel USER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background: radial-gradient(circle at top left, #dbeafe 0%, #eff6ff 40%, #f8fafc 100%);">
<nav class="navbar navbar-expand-lg bg-primary navbar-dark shadow-sm">
    <div class="container">
        <span class="navbar-brand fw-semibold">Panel USER</span>
        <form th:action="@{/logout}" method="post" class="d-flex">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn btn-light btn-sm">Cerrar sesión</button>
        </form>
    </div>
</nav>

<div class="container py-5">
    <div class="card border-0 shadow-lg rounded-4">
        <div class="card-body p-5">
            <h2 class="fw-bold mb-2">Bienvenido a tu zona USER</h2>
            <p class="text-muted mb-4">Ingresaste con el usuario: <strong th:text="${username}"></strong></p>
            <div class="alert alert-info border-0">
                Esta sección está habilitada para roles USER y ADMIN.
            </div>
            <a href="/public" class="btn btn-outline-primary">Volver a página pública</a>
        </div>
    </div>
</div>
</body>
</html>
